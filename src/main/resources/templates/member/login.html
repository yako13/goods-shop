<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>로그인</title>
    <link rel="stylesheet" href="/css/login.css">
    <style>

        a{
            text-decoration: none;
            color: rgb(102, 102, 102);
        }

        input:focus {
            box-shadow: 5px 5px 15px #CDDAFD;
        }

        .oauth2 {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .oauth2Image {
            width: 50px;
            height: 50px;
            margin-right: 20px;
            margin-left: 20px;
        }
        .google {
            background-color: #F2F2F2;
        }


        .container {
            background: #DFE7FD;
            display: block;
            width: 450px;
            border-radius: 7px;
            margin: 100px auto;
            height: 650px;
            box-shadow: 5px 5px 25px rgb(172, 172, 172);
        }

        h1 {
            color: white;
            font-size: 48px;
            letter-spacing: -3px;
            text-align: center;
            transition: .2s linear;
        }

        .links {
            list-style-type: none;

            li {
                display: inline-block;
                margin: 0 20px 0 0;
                transition: .2s linear;

                &:nth-child(2) {
                    opacity: .6;

                    &:hover {
                        opacity: 1;
                    }
                }

                &:nth-child(3) {
                    opacity: .6;
                    float: right;

                    &:hover {
                        opacity: 1;
                    }
                }

                a {
                    text-decoration: none;
                    color: white;
                    font-weight: bolder;
                    text-align: center;
                    cursor: pointer;
                }
            }
        }


        form {
            width: 100%;
            max-width: 680px;
            margin: 40px auto 10px;

            .input__block {
                margin: 20px auto;
                display: block;
                position: relative;

                &.first-input__block {
                    &::before {
                        content: "";
                        position: absolute;
                        top: -15px;
                        left: 50px;
                        display: block;
                        width: 0;
                        height: 0;
                        background: transparent;
                        border-left: 15px solid transparent;
                        border-right: 15px solid transparent;
                        border-bottom: 15px solid rgba(#0f132a, .1);
                        transition: .2s linear;
                    }
                }


                input {
                    display: block;
                    width: 420px;
                    max-width: 680px;
                    height: 50px;
                    margin: 0 auto;
                    border-radius: 8px;
                    border: none;
                    background: white;
                    color: black;
                    padding: 0 0 0 15px;
                    font-size: 14px;
                    

                    &:focus,
                    &:active {
                        outline: none;
                        border: none;
                        color: rgba(#0f132a, 1);
                    }

    
                }
            }

            .btn {
                background: #afc4ff;
                color: white;
                display: block;
                width: 92.5%;
                max-width: 680px;
                height: 50px;
                border-radius: 8px;
                margin: 0 auto;
                border: none;
                cursor: pointer;
                font-size: 14px;
                transition: .2s linear;
            }

            .btn:hover {
                background-color: #95b1ff;
            }

        }

        .separator {
            display: block;
            margin: 30px auto 10px;
            text-align: center;
            height: 20px;
            position: relative;
            background: transparent;
            color: rgb(111, 111, 111);
            font-size: 13px;
            width: 90%;
            max-width: 680px;

            &::before {
                content: "";
                position: absolute;
                top: 8px;
                left: 0;
                background: rgb(111, 111, 111);
                height: 1px;
                width: 45%;
            }

            &::after {
                content: "";
                position: absolute;
                top: 8px;
                right: 0;
                background: rgb(111, 111, 111);
                height: 1px;
                width: 45%;
            }
        }

        .title {
            display: flex;
            flex-direction: column;
        }

        .find {
            display: flex;
            justify-content: center;
        }

        .find {
            padding-top: 10px;
            a:hover {
                font-weight: 600;
            }

            span {
                margin-left: 5px;
                margin-right: 5px;
            }
        }

        .easyLogin{
            p{
                text-align: center;
                margin-bottom: 30px;
                font-weight: 600;
            
            }
        }
    </style>
</head>

<body class="text-center">
    <!--<div th:if="${param.error}" class="alert alert-secondary">-->
    <!--    <p>아이디나 비밀번호가 잘못되었습니다.</p>-->
    <!--</div>-->
    <div class="container">
        <div class="title">
            <h1>Sign In</h1>
        </div>
        <ul class="links">
            <li>
                <a th:href="@{/login}" id="signin">SIGN IN</a>
            </li>
            <li>
                <a th:href="@{/join}" id="signup">SIGN UP</a>
            </li>
        </ul>

        <!-- Form -->
        <form th:action="@{/login}" method="post">
            <!-- id input -->
            <div class="first-input input__block first-input__block">
                <input type="text" placeholder="아이디" class="input" name="userId" />
            </div>
            <!-- password input -->
            <div class="input__block">
                <input type="password" placeholder="Password" class="input" id="password" />
            </div>
            <!-- sign in button -->
            <button class="btn">
                <b>로그인</b>
            </button>
        </form>
        <div class="find">
            <a th:href="@{/find/id}">아이디 찾기</a><span>|</span><a th:href="@{/find/password}">비밀번호 찾기</a>
        </div>
        <!-- separator -->
        <div class="separator">
            <p>OR</p>
        </div>
        <div class="easyLogin">
            <p>SNS 간편 로그인</p>
        </div>
        <div class="oauth2">
            <a href="/oauth2/authorization/google"><img th:src="@{/images/google.png}" class="oauth2Image"></a>
            <a href="/oauth2/authorization/naver"><img th:src="@{/images/naver.png}" class="oauth2Image"></a>
        </div>
    </div>

    </main>
    <script src="/js/login.js"></script>
</body>

</html>
