<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>아이디 찾기 결과</title>
    <link rel="stylesheet" th:href="@{/css/find.css}">
    <style>
        .container {
            background: #DFE7FD;
            display: block;
            width: 450px;
            border-radius: 7px;
            margin: 190px auto;
            height: 320px;
            box-shadow: 5px 5px 25px rgb(172, 172, 172);

            .foundId {
                padding-top: 80px;

                p {
                    text-align: center;
                    color: rgb(102, 102, 102);

                }

                #foundId {
                    color: blue;
                    font-weight: 600;
                }
            }

            .link {
                margin-top: 50px;
                display: flex;
                justify-content: center;
                text-align: center;
            }

        }
        
        #loginBtn,#pwBtn {
            font-size: 14px;
            border-radius: 7px;
            line-height: 40px;
                width: 130px;
                height: 40px;
                margin: 0px 10px 0px 10px;
              
            }

            #loginBtn{
                background-color: #afc4ff;
            }

            #loginBtn:hover{
                background-color: #94b0ff;

            }

            #pwBtn{
                background-color: #94b0ff;
            }

            #pwBtn:hover{
                background-color: #7599ff;;
            }

            a{
                text-decoration: none;
                color: white;
            }
    </style>
</head>

<body class="text-center">
    <div class="container">
        <div class="foundId">
            <b><p>아이디 찾기를 완료하였습니다.</p></b>
            <p id="foundId">alfks8***</p>
        </div>
        <div class="link">
            <a th:href="@{/login}">
                <div id="loginBtn"><b>
                    로그인</b>
                </div>
            </a>
            <div id="pwBtn">
                <a th:href="@{/find/password}"><b>비밀번호 찾기</b></a>
            </div>
        </div>
    </div>

    </main>
</body>

</html>
