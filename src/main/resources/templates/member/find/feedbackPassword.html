<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>비밀번호 찾기 결과</title>
    <link rel="stylesheet" th:href="@{/css/find.css}">
    <style>
        p {
            text-align: center;
        }

        .container {
            background: #DFE7FD;
            display: block;
            width: 450px;
            border-radius: 7px;
            margin: 190px auto;
            height: 320px;
            box-shadow: 5px 5px 25px rgb(172, 172, 172);

            .foundId {
                padding-top: 30px;

                p {
                    text-align: center;
                    font-weight: 600;
                    color: rgb(102, 102, 102);

                }
            }
        }


        input {
            display: block;
            width: 250px;
            height: 50px;
            margin: 20px auto;
            border-radius: 8px;
            border: none;
            background: white;
            color: black;
            padding: 0 0 0 15px;
            font-size: 14px;

        }

        .submitBtn {
            background-color: #afc4ff;
            width: 270px;
            height: 50px;
            border: none;
            border-radius: 7px;
            margin-top: 10px;
            margin-left: 90px;
            color: white;
            font-size: 14px;
        }

        .submitBtn:hover {
            background-color: #95b1ff;
        }

        input:focus {
            outline: none;
            box-shadow: 5px 5px 15px #CDDAFD;
        }
    </style>
</head>

<body class="text-center">
    <div class="container">
        <div class="foundId">
            <form th:action="@{/password/update}" th:method="post">
                <p>
                    비밀번호를 재설정하여 주십시오.
                </p>
                <div>
                    <input type="password" class="form-control" id="userPassword" name="userPassword" placeholder="비밀번호"
                        required>
                </div>
                <div>
                    <input type="password" class="form-control" id="passwordCheck" placeholder="비밀번호 확인" required>
                </div>
                <div>
                    <button type="submit" class="submitBtn"><b>확인</b></button>
                </div>
            </form>
        </div>

    </div>

    </main>
</body>

</html>
