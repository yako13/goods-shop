<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>회원가입</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
    <style>
        input:focus {
            box-shadow: 5px 5px 15px #CDDAFD;
            outline: none;
        }

        .error {
            color: red;
        }

        .container {
            background: #DFE7FD;
            display: block;
            width: 450px;
            border-radius: 7px;
            margin: 100px auto;
            height: 870px;
            box-shadow: 5px 5px 25px rgb(172, 172, 172);
        }

        h1 {
            color: white;
            font-size: 48px;
            letter-spacing: -3px;
            text-align: center;
            transition: .2s linear;
        }

        .links {
            list-style-type: none;

            li {
                display: inline-block;
                margin: 0 20px 0 0;
                transition: .2s linear;

                &:nth-child(1) {
                    opacity: .6;

                    &:hover {
                        opacity: 1;
                    }
                }

                &:nth-child(3) {
                    opacity: .6;
                    float: right;

                    &:hover {
                        opacity: 1;
                    }
                }

                a {
                    text-decoration: none;
                    color: white;
                    font-weight: bolder;
                    text-align: center;
                    cursor: pointer;
                }
            }
        }
        form {
            width: 100%;
            max-width: 680px;
            input {
            display: block;
            width: 420px !important;
            height: 50px;
            margin: 20px 7.5px;
            border-radius: 8px;
            border: none;
            background: white;
            color: black;
            padding: 0 0 0 15px;
            font-size: 14px;

        }

        }

        .form-control {
            margin-bottom: 20px;
        }

        ul {
            list-style-type: none;
        }

        .separator {
            display: block;
            margin: 30px auto 10px;
            text-align: center;
            height: 20px;
            position: relative;
            background: transparent;
            color: rgb(111, 111, 111);
            font-size: 13px;
            width: 90%;
            max-width: 680px;

            &::before {
                content: "";
                position: absolute;
                top: 8px;
                left: 0;
                background: rgb(111, 111, 111);
                height: 1px;
                width: 40%;
            }

            &::after {
                content: "";
                position: absolute;
                top: 8px;
                right: 0;
                background: rgb(111, 111, 111);
                height: 1px;
                width: 40%;
            }
        }

        .agreeAll {
            padding-left: 20px;
            display: flex;
            line-height: 30px;
            li{
                color: rgb(111, 111, 111);
            }

            img {
                width: 30px;
                height: 30px;
            }
        }

        .join_box {
            padding: 0px;
        }

        textarea {
            margin-left: 20px;
            width: 405px;
            height: 50px;
        }

        .essential {
            color: red;
        }

        .custom_textarea {
            resize: none;
            color: black;
            border: none;
            border-bottom: 2px solid #0000007e;
            outline: none;
        }

        .btn {
            background: #afc4ff;
            color: white;
            display: block;
            width: 410px;
            height: 50px;
            border-radius: 8px;
            margin: 0 auto;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: .2s linear;
        }
        
        .btn:hover {
                background-color: #95b1ff;
            }

        #check01,
        #check02,
        #check03 {
            width: 20px;
            height: 30px;
        }

        .btnArea {
            height: 70px;
        }

        .namePhone {
            width: 450px;
            display: flex;

            input {
                width: 135px;
                margin-top: 0px;
            }
        }

        .title {
         
            display: flex;
            flex-direction: column;
        }

        .fa-circle-check{
            color: #95b1ff;
        }
    </style>

</head>

<body class="text-center">
        <div class="container">
            <div class="title">
                <h1>Sign-up</h1>
            </div>
            <ul class="links">
                <li>
                    <a th:href="@{/login}" id="signin">SIGN IN</a>
                </li>
                <li>
                    <a th:href="@{/join}" id="signup">SIGN UP</a>
                </li>
            </ul>
            <form th:action="@{/join}" th:method="post" enctype="multipart/form-data">
               
                    <div class="first-input input__block first-input__block">
                        <input type="text" placeholder="아이디" class="input" name="userId" />
                    </div>
                
                <div>
                    <span class="error" th:text="${valid_userId}"></span>
                    <span class="error" th:text="${duplicateId}"></span>
                </div>
                <div>
                    <div>
                        <input type="password" class="form-control" id="userPassword" name="userPassword"
                            placeholder="비밀번호" required>
                    </div>
                    <div>
                        <input type="password" class="form-control" id="passwordCheck" placeholder="비밀번호 확인" required>
                    </div>
                </div>
                <div>
                    <span class="error" style="display: none;" id="passwordError">비밀번호가 일치하지 않습니다.</span>
                </div>
                <div>
                    <span class="error" th:text="${valid_userPassword}"></span>
                </div>
                <div class="namePhone">
                    <input type="text" class="form-control " id="name" name="name" placeholder="이름">
                    <input type="text" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="연락처">
                </div>
                <!-- separator -->
                <div class="separator">
                    <p>약관 동의</p>
                </div>
                <div class="agree">
                    <ul class="join_box">
                        <li class="checkBox check01">
                            <ul class="agreeAll">
                                <li><i class="fa-regular fa-circle-check" id="check01"></i></li>
                                <li>전체 동의
                                </li>
                            </ul>
                        </li>
                        <li class="checkBox check02">
                            <ul class="agreeAll">
                                <li><i class="fa-regular fa-circle-check" id="check02"></i></li>
                                <li>이용약관 동의<span class="essential">[필수]</span></li>
                                <li class="checkBtn">
                                    <input type="hidden" name="termsAgreement" id="termsAgreement">
                                </li>
                            </ul>
                            <textarea class="custom_textarea">여러분을 환영합니다.구름별 공방 서비스 및 제품(이하 ‘서비스’)을 이용해 주셔서 감사합니다. 본 약관은 다양한 구름별 공방 서비스의 이용과 관련하여 구름별 공방 서비스를제공하는 구름별 공방과 이를 이용하는 구름별 공방 서비스 회원(이하 ‘회원’) 또는 비회원과의 관계를 설명하며, 아울러 여러분의 구름별 공방 서비스 이용에 도움이 될 수 있는 유익한 정보를 포함하고 있습니다.
        </textarea>
                        </li>
                        <li class="checkBox check03">
                            <ul class="agreeAll">
                                <li><i class="fa-regular fa-circle-check" id="check03"></i></li>
                                <li>개인정보 수집 및 이용에 대한 안내<span class="essential">[필수]</span></li>
                                <li class="checkBtn">
                                    <input type="hidden" name="privacyAgreement" id="privacyAgreement">
                                </li>
                            </ul>

                            <textarea
                            class="custom_textarea">개인정보보호법에 따라 구름별 공방에 회원가입 신청하시는 분께 수집하는 개인정보의 항목, 개인정보의 수집 및 이용목적, 개인정보의 보유 및 이용기간, 동의 거부권 및 동의 거부 시 불이익에 관한 사항을 안내 드리오니 자세히 읽은 후 동의하여 주시기 바랍니다.
                                1. 수집하는 개인정보이용자가 회원제 서비스를 이용하기 위해 회원가입을 할 경우, 구름별 공방은 서비스 이용을 위해 필요한 최소한의 개인정보를 수집합니다.회원가입 시점에 네이버가 이용자로부터 수집하는 개인정보는 아래와 같습니다.
 - 회원 가입 시 필수항목으로 아이디, 비밀번호, 이름, 휴대전화번호를 수집합니다. - 회원정보 또는 개별 서비스에서 프로필 정보(프로필 사진)를 설정할 수 있습니다. 
2. 수집한 개인정보의 이용
구름별 공방 서비스의 회원관리, 서비스 개발・제공 및 향상, 안전한 인터넷 이용환경 구축 등 아래의 목적으로만 개인정보를 이용합니다.
- 회원 가입 의사의 확인,이용자 식별, 회원탈퇴 의사의 확인 등 회원관리를 위하여 개인정보를 이용합니다.
- 유료 서비스 제공에 따르는 구매 및 결제, 상품 및 서비스의 배송을 위하여 개인정보를 이용합니다.
 - 보안, 프라이버시, 안전 측면에서 이용자가 안심하고 이용할 수 있는 서비스 이용환경 구축을 위해 개인정보를 이용합니다.
 3. 개인정보의 보관기간
회사는 이용자의 개인정보를 회원 탈퇴 시 6개월 간 보관하고 있습니다.
4. 개인정보 수집 및 이용 동의를 거부할 권리
이용자는 개인정보의 수집 및 이용 동의를 거부할 권리가 있습니다. 회원가입 시 수집하는 최소한의 개인정보, 즉, 필수 항목에 대한 수집 및 이용 동의를 거부하실 경우, 회원가입이 어려울 수 있습니다.</textarea>

                        </li>
                    </ul>
                </div>

                <div class="btnArea">
                    <button class="btn" type="button" id="button">가입하기</button>
                </div>
            </form>
        </div>
    <!--    <script src="/static/js/join.js"></script>-->
    <script>
        let bol = true;
        let check01 = document.getElementById("check01");
        let check02 = document.getElementById("check02");
        let check03 = document.getElementById("check03");

        let privacyAgreement = document.getElementById("privacyAgreement");
        let termsAgreement = document.getElementById("termsAgreement");

        function check() {
            bol = !bol;
        }


        check01.addEventListener("click", () => {
            if (bol) {
                check01.className = "fa-solid fa-circle-check";
                check02.className = "fa-solid fa-circle-check";
                check03.className = "fa-solid fa-circle-check";
                check();
                termsAgreement.value = true;
                privacyAgreement.value = true;
            }
            else {
                check01.className =  "fa-regular fa-circle-check";
                check02.className =  "fa-regular fa-circle-check";
                check03.className =  "fa-regular fa-circle-check";
                check();
                termsAgreement.value = false;
                privacyAgreement.value = false;
            }


        })

        let bol2 = true;
        function bol_2() {
            bol2 = !bol2;
        }

        let bol3 = true;
        function bol_3() {
            bol3 = !bol3;
        }

        check02.addEventListener("click", () => {
            if (bol2) {
                check02.className = "fa-solid fa-circle-check";
                bol_2();
                termsAgreement.value = true;
            }
            else {
                check02.className = "fa-regular fa-circle-check";
                bol_2();
                termsAgreement.value = false;
            }
        })

        check03.addEventListener("click", () => {
            if (bol3) {
                check03.className = "fa-solid fa-circle-check";
                bol_3();
                privacyAgreement.value = true;
            }
            else {
                check03.className = "fa-regular fa-circle-check";
                bol_3();
                privacyAgreement.value = false;
            }
        })




    </script>
</body>

</html>
