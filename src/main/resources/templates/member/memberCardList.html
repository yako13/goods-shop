<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️CloudStar WorkShop 회원 결제수단</title>

    <link rel="stylesheet" th:href="@{/css/mainPage.css}">
    <link rel="stylesheet" th:href="@{/css/member/memberCardList.css}">
</head>

<body>

    <!-- 헤더 시작 -->

    <header th:replace="/fragments/memberHeader::memberHeader"></header>
    <input type="hidden" th:value="${alert}" id="dataAlert">

    <!-- 헤더 끝 -->


    <!-- 메인 시작 -->


    <div class="">

        <div class="HanCardBody" id="">

            <!--메뉴바 시작-->

            <div th:replace="/fragments/menuBar::menuBar"></div>

            <!--메뉴바 끝-->

            <div class="HanCardMain">

                <div class="HanCardLogoMain">

                    <div class="HanCardLogoDiv">

                        <img th:src="@{/images/logoMain.png}" alt="" width="600px" height="auto">

                    </div>

                    <h1>CloudStar Workshop</h1>

                </div>

                <!-- 카드 목록 -->
                <div class="HanCardContainer">
                    <input type="hidden" th:value="${session.memberId}" name="memberId" id="sessionId">

                    <!-- 카드 시작 -->

                    <div class="HanCard" th:each="payList :${payList}" th:id="'cardBody'+${payList.id}">

                        <div class="HanCardRadio">

                            <img th:if="${payList.defaultCard == true}" th:src="@{/images/card6on.svg}" alt=""
                                width="65px" height="65px">
                            <img th:if="${payList.defaultCard == false}" th:src="@{/images/card6off.svg}" alt=""
                                width="65px" height="65px">

                            <div class="HanCardTextDiv">

                                <div class="HanCardTextTagDiv">

                                    <p class="HanCardTextTag" th:text="${payList.nickName}"></p>

                                    <p class="HanCardTextP1" th:if="${payList.defaultCard == true}">기본 결제카드</p>

                                    <img th:src="@{/images/close.svg}" alt="" th:id="${payList.id}" class="XBtn">

                                </div>

                                <div class="HanCardTextDiv2">


                                    <p class="HanCardTextP2" th:text="${payList.number}"></p>

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- 카드 끝 -->


                </div>

                <div>

                    <div class="HanNewButton">

                        <img th:src="@{/images/plus.svg}" alt="">
                        <button id="openNewAddressModal" class="HanNew" type="button"
                            onclick="location='http://localhost:8080/member/pay/create'">카드 등록하기</button>

                    </div>

                </div>

            </div>
        </div>

    </div>
    </div>


    <!-- 메인 끝 -->


    <!-- 푸터 시작 -->

    <footer th:replace="/fragments/memberFooter::memberFooter"></footer>

    <!-- 푸터 끝 -->
    <script src="http://code.jquery.com/jquery-latest.min.js"></script>
    <script th:src="@{/js/member/cardList.js}"></script>
    <script th:src="@{/js/member/alert.js}"></script>
    <script>
    </script>

</body>

</html>
