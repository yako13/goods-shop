<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStar WorkShop</title>

    <link rel="stylesheet" th:href="@{/css/mainPage.css}">
    <link rel="stylesheet" th:href="@{/css/member/memberCardList.css}">

</head>

<body>

<!-- 헤더 시작 -->

<header th:replace="/fragments/memberHeader::memberHeader"></header>

<!-- 헤더 끝 -->


<!-- 메인 시작 -->


<div class="">

    <div class="HanCardBody" id="">

        <!--메뉴바 시작-->

        <div th:replace="/fragments/menuBar::menuBar"></div>

        <!--메뉴바 끝-->

        <div class="HanCardMain">

            <div class="HanCardLogoMain">

                <div class="HanCardLogoDiv">

                    <img th:src="@{/images/logoMain.png}" alt="" width="600px" height="auto">

                </div>

                <h1>CloudStar Workshop</h1>

            </div>

            <!-- 카드 목록 -->
            <div class="HanCardContainer">


                <!-- 카드 시작 -->

                <div class="HanCard">

                    <div class="HanCardRadio">

                        <img th:src="@{/images/card6on.svg}" alt="" width="65px" height="65px">

                        <div class="HanCardTextDiv">

                            <div class="HanCardTextTagDiv">

                                <p class="HanCardTextTag">국민카드</p>

                                <p class="HanCardTextP1">기본 결제카드</p>

                                <a href="#"><img th:src="@{/images/close.svg}" alt=""></a>

                            </div>

                            <div class="HanCardTextDiv2">


                                <p class="HanCardTextP2">11111-2222-3333-4444</p>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- 카드 끝 -->


                <!-- 카드 시작 -->

                <div class="HanCard">

                    <div class="HanCardRadio">

                        <img th:src="@{/images/card6off.svg}" alt="" width="65px" height="65px">

                        <div class="HanCardTextDiv">

                            <div class="HanCardTextTagDiv">

                                <p class="HanCardTextTag">신한카드</p>


                                <a href="#"><img th:src="@{/images/close.svg}" alt=""></a>

                            </div>

                            <div class="HanCardTextDiv2">


                                <p class="HanCardTextP2">11111-2222-3333-4444</p>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- 카드 끝 -->


                <!-- 카드 시작 -->

                <div class="HanCard">

                    <div class="HanCardRadio">

                        <img th:src="@{/images/card6off.svg}" alt="" width="65px" height="65px">

                        <div class="HanCardTextDiv">

                            <div class="HanCardTextTagDiv">

                                <p class="HanCardTextTag">롯데카드</p>


                                <a href="#"><img th:src="@{/images/close.svg}" alt=""></a>

                            </div>

                            <div class="HanCardTextDiv2">


                                <p class="HanCardTextP2">11111-2222-3333-4444</p>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- 카드 끝 -->


            </div>

            <div>

                <div class="HanNewButton">

                    <img th:src="@{/images/plus.svg}" alt="">
                    <button id="openNewAddressModal" class="HanNew" type="button">카드 등록하기</button>

                </div>

                <div class="HanCardButton">

                    <button class="HanSubmit" id="selectAddressButton">확인</button>
                    <button class="HanClose" id="closeAddressModal">닫기</button>

                </div>

            </div>

        </div>
    </div>

</div>
</div>


<!-- 메인 끝 -->


<!-- 푸터 시작 -->

<footer th:replace="/fragments/memberFooter::memberFooter"></footer>

<!-- 푸터 끝 -->


</body>

</html>
