<!DOCTYPE html>

    <style>
        .carousel {
          margin: 20px auto;
          margin-top: 40px;
          position: relative;
          width: 1400px;
          height: 300px;
          overflow: hidden;
          border-radius: 7px;
          background-color: rgb(255, 219, 219);
          /* box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2); */
        }

        .carousel-track {
          display: flex;
          width: calc(800px * 7);
          /* 이미지 개수 + 복제된 첫/마지막 이미지 */
          transition: transform 0.5s ease-in-out;
        }

        .carousel img {
          width: 800px;
          height: 300px;
          object-fit: cover;
          flex-shrink: 0;
        }

        /* 좌우 버튼 */
        .carousel-btn {
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          background-color: rgba(255, 255, 255, 0.7);
          border: none;
          padding: 10px;
          cursor: pointer;
          border-radius: 50%;
          font-size: 20px;
          z-index: 100;
        }

        .prev {
          left: 10px;
        }

        .next {
          right: 10px;
        }

        /* 네비게이션 점 */
        .dots {
          position: absolute;
          bottom: 10px;
          left: 50%;
          transform: translateX(-50%);
          display: flex;
          gap: 10px;
        }

        .dot {
          width: 10px;
          height: 10px;
          background-color: white;
          border-radius: 50%;
          cursor: pointer;
        }

        .dot.active {
          background-color: #ff7f7f;
        }
    </style>


</head>
