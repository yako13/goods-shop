<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매자 네비게이션</title>
    <link href="/css/masterNavigation.css" rel="stylesheet">
</head>
<body>

    <!-- 네비 바 시작 -->

    <nav th:fragment="masterNav">

        <div class="SlideNavBody">

            <div class="SlideNavOpenDiv ">

                <img class="SlideOpen " th:src="@{/images/arrowRightSlide.svg}" onclick="openNav()">

            </div>

        </div>

        <div id="mySidenav" class="sidenav">

            <div>

                <div class="logoArea">
                    <img th:src="@{/images/logoSmall.png}" class="logoImage">
                </div>

                <a href="#">상품 관리</a>
                <a href="#">주문 관리</a>
            </div>

            <div class="SlideNavCloseDiv ">

                <img class="SlideClose " th:src="@{/images/arrowLeftSlide.svg}" onclick="closeNav()">

            </div>

        </div>

        </div>

    </nav>

    <!-- 네비 바 끝 -->

</body>

</html>
