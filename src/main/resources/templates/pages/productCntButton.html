<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    .HanProductCntDiv {

      display: flex;
      width: 550px;
      justify-content: space-between;
    }


    /* 수량버튼 css */
    .HanProductSpinner {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      overflow: hidden;
      width: 120px;
      height: 40px;
      margin-top: 7px;
    }

    .HanProductSpinner button {
      width: 35px;
      height: 40px;
      background-color: #f9f9f9;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #333;
    }


    .HanProductSpinner button:disabled {
      cursor: not-allowed;
      color: #aaa;
    }

    .HanProductSpinner button:hover:not(:disabled) {
      background-color: #aefcf3;
    }

    .HanProductSpinner input {
      width: 50px;
      text-align: center;
      border: none;
      outline: none;
      font-size: 16px;
    }


    .HanProductPriceSum {
      font-size: 35px;

    }

    .HanProductSumCnt {
      color: #969696;
      font-size: 18px;
    }

    .HanProductPriceSumCnt {
      color: #969696 ;
      font-size: 22px;
    }
  </style>

</head>

<body>


  <!-- 상품 가격 (할인가) -->
  <input type="hidden" id="HanProductPriceSaleValue" value=10000>

  <div class="HanProductCntDiv">
    <!-- 수량버튼 -->
    <div class="HanProductSpinner">
      <button onclick="changeQuantity(-1)">-</button>
      <input type="text" id="HanProductValue" value="1" readonly />
      <button onclick="changeQuantity(1)">+</button>
    </div>


    <div>
      <span class="HanProductSumCnt" style="padding: 30px; ">총 금액</span>
      <span class="HanProductPriceSumCnt"></span>

      <!-- 총 금액 보여주는 곳 자바스크립트로 처리 -->
      <span class="HanProductPriceSum" id="HanProductPriceSum">10000</span>
      <span class="HanProductSpan3">원</span>
    </div>
  </div>

  <script>

    const unitPrice = document.getElementById('HanProductPriceSaleValue').value;
    const quantityInput = document.getElementById('HanProductValue');
    // const quantityInputHidden = document.getElementById('HanProductValueHidden');
    // const quantityInputHidden2 = document.getElementById('HanProductValueHidden2');
    const totalPriceElement = document.getElementById('HanProductPriceSum');
    const soldOut = document.getElementById('soldOut');

    function changeQuantity(change) {


      let currentQuantity = parseInt(quantityInput.value);


      //+-버튼에 따라 수량 증감을 보여준다
      currentQuantity += change;


      // 1보다 작아지지 않게
      if (currentQuantity < 1) {
        currentQuantity = 1;
      }
      //구매하기와 장바구니 둘다 input hidden에 넣어줌
      quantityInput.value = currentQuantity;
      // quantityInputHidden.value = currentQuantity;
      // quantityInputHidden2.value = currentQuantity;

      //수량에 따라 가격 변동해주는 함수 호출
      updateTotalPrice(currentQuantity);

    }


    //수량에 따라 가격변동 함수
    function updateTotalPrice(quantity) {

      let priceSumTmp = parseInt(unitPrice);

      if (isNaN(priceSumTmp) || !Number.isInteger(priceSumTmp)) {
        document.getElementById('HanProductPriceSum').textContent = '가격오류';
      } else {

        const totalPrice = (priceSumTmp * quantity);


        const formatted3 = totalPrice.toLocaleString('ko-KR'); // 천 단위로 쉼표 추가
        document.getElementById('HanProductPriceSum').textContent = formatted3;
      }
    }






  </script>


</body>

</html>
