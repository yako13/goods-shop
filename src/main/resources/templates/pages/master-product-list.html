<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <style>
      a {
        text-decoration: none;
        color: #000000;
      }
      .master-nav {
        width: 15rem;
        height: 90vh;
        background-color: aliceblue;
        border: 1px solid #000000;
        position: fixed;
      }
      .nav__img {
        text-align: center;
        margin-top: 3rem;
      }
      .nav__img--logo {
        width: 8rem;
        height: 8rem;
      }
      .nav__text {
        font-size: 1.5rem;
        text-align: center;
        margin-top: 4rem;
      }
      .nav__logout {
        position: relative;
        top: 28rem;
      }
      .master__product {
        margin-left: 16rem;
        width: 80rem;
        height: 90vh;
        border: 1px solid #000000;
      }
      .table__product {
        margin: 2rem;
      }

      table {
        border: 1px #a39485 solid;
        font-size: 0.9em;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
        width: 100%;
        border-collapse: collapse;
        border-radius: 5px;
        overflow: hidden;
      }

      thead {
        font-weight: bold;
        color: #fff;
        background: #cddafd;
      }

      td,
      th {
        padding: 1em 0.5em;
        vertical-align: middle;
        text-align: center;
      }

      td {
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        background: #fff;
      }
      .btn {
        font-size: 1rem;
        font-weight: bold;
      }
      .btn-blue {
        background-color: #ffffff;
        border: 2px solid #cddafd;
        border-radius: 7px;
        color: #cddafd;
      }
      .btn-blue:hover {
        background-color: #cddafd;
        color: #ffffff;
      }
      .btn-red {
        background-color: #ffffff;
        border: 2px solid #fad2e1;
        border-radius: 7px;
        color: #fad2e1;
      }
      .btn-red:hover {
        background-color: #fad2e1;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <h1>Master-Product-List</h1>
    <main class="master__container--flex">
      <!-- nav 메뉴 -->
      <nav class="master-nav">
        <div class="nav__img">
          <img
            class="nav__img--logo"
            src="/src/main/resources/static/img/star-cloud-removebg-preview.png" />
        </div>
        <a href="#"><p class="nav__text">상품 관리</p></a>
        <a href="#"><p class="nav__text">주문 관리</p></a>
        <a href="#"><p class="nav__text nav__logout">로그아웃</p></a>
      </nav>
      <!-- /nav 메뉴 -->
      <section class="master__product">
        <div class="table__product">
          <div>상품목록 (총 n개)</div>
          <table>
            <thead>
              <th>순번</th>
              <th>상품명</th>
              <th>판매가격</th>
              <th>재고수량</th>
              <th>등록일자</th>
              <th>수정일자</th>
              <th>상품수정</th>
              <th>상품삭제</th>
            </thead>
            <tbody>
              <tr>
                <th>1</th>
                <td><a href="#">춘식캣 쉬폰</a></td>
                <td>35,000 원</td>
                <td>31 개</td>
                <td>2025-02-22 12:30:56</td>
                <td>2025-02-23 12:10:12</td>
                <td>
                  <button class="btn btn-blue" type="button">수정하기</button>
                </td>
                <td>
                  <button class="btn btn-red" type="button">삭제하기</button>
                </td>
              </tr>
              <tr>
                <th>2</th>
                <td><a href="#">코지캣 쉬폰</a></td>
                <td>30,000 원</td>
                <td>34 개</td>
                <td>2025-02-23 12:34:56</td>
                <td>2025-02-24 12:12:12</td>
                <td>
                  <button class="btn btn-blue" type="button">수정하기</button>
                </td>
                <td>
                  <button class="btn btn-red" type="button">삭제하기</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
  <script></script>
</html>
