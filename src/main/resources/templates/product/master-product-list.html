<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <link rel="stylesheet" href="/css/master/masterHeader.css" />
    <link rel="stylesheet" href="/css/master/masterNavigation.css" />
    <style>
      body {
        margin: 0px;
      }
      a {
        text-decoration: none;
        color: #000000;
      }
      .master-nav {
        width: 15rem;
        height: 90vh;
        background-color: aliceblue;
        border: 1px solid #000000;
        position: fixed;
      }
      .nav__img {
        text-align: center;
        margin-top: 3rem;
      }
      .nav__img--logo {
        width: 8rem;
        height: 8rem;
      }
      .nav__text {
        font-size: 1.5rem;
        text-align: center;
        margin-top: 4rem;
      }
      .nav__logout {
        position: relative;
        top: 28rem;
      }
      .master__product {
        margin-top: 4rem;
      }
      .table__product {
        margin: 2rem;
      }

      table {
        border: 1px #a39485 solid;
        font-size: 0.9em;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.25);
        width: 100%;
        border-collapse: collapse;
        border-radius: 5px;
        overflow: hidden;
      }

      thead {
        font-weight: bold;
        color: #fff;
        background: #cddafd;
      }

      td,
      th {
        padding: 1em 0.5em;
        vertical-align: middle;
        text-align: center;
      }

      td {
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        background: #fff;
      }
      .btn {
        font-size: 1rem;
        font-weight: bold;
      }
      .btn-blue {
        background-color: #ffffff;
        border: 2px solid #cddafd;
        border-radius: 7px;
        color: #cddafd;
      }
      .btn-blue:hover {
        background-color: #cddafd;
        color: #ffffff;
      }
      .btn-red {
        background-color: #ffffff;
        border: 2px solid #fad2e1;
        border-radius: 7px;
        color: #fad2e1;
      }
      .btn-red:hover {
        background-color: #fad2e1;
        color: #ffffff;
      }
      .btn-green {
        border: 2px solid #74cc6c;
        border-radius: 7px;
        color: #74cc6c;
        background-color: #ffffff;
      }
      .btn-green:hover {
        background-color: #74cc6c;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <header th:replace="~{/fragments/masterHeader::masterHeader}"></header>
    <nav th:replace="~{/fragments/masterNavigation::masterNav}"></nav>
    <main id="main">
      <section class="master__product">
        <div class="table__product">
          <div>상품목록 (총 n개)</div>
          <a href="/master/product/register"
            ><button class="btn btn-green">등록하기</button></a
          >
          <table>
            <thead>
              <th>순번</th>
              <th>이미지</th>
              <th>상품명</th>
              <th>카테고리</th>
              <th>판매가격</th>
              <th>재고수량</th>
              <th>등록일자</th>
              <th>수정일자</th>
              <th>상품수정</th>
              <th>상품삭제</th>
            </thead>
            <tbody>
              <tr th:each="productList : ${productList}">
                <th th:text="${productList.id}"></th>
                <th>
                  <img
                    th:src="${productList.mainImagePath}"
                    style="width: 4rem; height: 4rem" />
                </th>
                <td th:text="${productList.name}"><a href="#"></a></td>
                <td th:text="${productList.productCategory}"></td>
                <td
                  th:text="${#numbers.formatInteger(productList.price, 3, 'COMMA') + '원'}"></td>
                <td th:text="${productList.count + '개'}"></td>
                <td
                  th:text="${#temporals.format(productList.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                <td
                  th:text="${#temporals.format(productList.modifiedAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
                <td>
                  <a
                    th:href="@{/master/product/edit/{id}(id=${productList.id})}">
                    <button class="btn btn-blue" type="button">
                      수정하기
                    </button></a
                  >
                </td>
                <td>
                  <a
                    th:href="@{/master/product/delete/{id}(id=${productList.id})}"
                    ><button class="btn btn-red" type="button">
                      삭제하기
                    </button></a
                  >
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
  <script th:src="@{/js/master/masterNavigation.js}"></script>
</html>
