<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/css/master/masterHeader.css" />
    <link rel="stylesheet" href="/css/master/masterNavigation.css" />
    <link rel="stylesheet" th:href="@{/css/product/productEdit.css}" />

    <style>
      .thumbnail {
        max-width: 150px;
        max-height: 150px;
        display: block;
        margin-bottom: 10px;
      }
      .image-container {
        display: flex;
        /* margin-right: 10px; */
        position: relative;
      }
      .btn-delete {
        font-size: 1rem;
        border: 0px;
        border-radius: 10px;
        background-color: #ffffff;
        /* color: #6a6a6a; */
        height: 20px;
        position: relative;
        top: 30px;
        cursor: pointer;
      }
      /* .btn-delete:hover {
        background-color: #b578ff33;
      } */
    </style>
  </head>
  <body>
    <header th:replace="~{/fragments/masterHeader::masterHeader}"></header>
    <nav th:replace="~{/fragments/masterNavigation::masterNav}"></nav>
    <main class="container__main" id="main">
      <div class="master__product">
        <div th:each="product : ${product}" class="container__form">
          <!-- form -->
          <form
            th:action="@{/master/product/edit/{id}(id=${product.id})}"
            method="post"
            onsubmit="return doAction();"
            enctype="multipart/form-data">
            <!-- 상품명 -->
            <div class="container__input">
              <label for="productName"
                >상품명<span class="required-text">* 필수</span></label
              >
              <input
                type="text"
                id="productName"
                name="name"
                placeholder="상품명은 30자 이내로 작성해주세요."
                oninput="this.value = this.value.replace(/[^a-zA-Z0-9ㄱ-ㅎ ㅏ-ㅣ 가-힇!@#$%^&*,./?]/g, '').substr(0, 30)"
                th:value="${product.name}" />
            </div>
            <!-- /상품명 -->

            <!-- 카테고리 -->
            <div class="container__input">
              <label for="category"
                >카테고리<span class="required-text">* 필수</span></label
              >
              <select id="category" name="productCategory">
                <option value="#" disabled="disabled">
                  카테고리를 선택해주세요
                </option>
                <option
                  value="PHOTO_CARD"
                  th:selected="${product.productCategory.name() eq 'PHOTO_CARD'}">
                  포토카드홀더
                </option>
                <option
                  value="MEMO"
                  th:selected="${product.productCategory.name() eq 'MEMO'}">
                  메모지
                </option>
                <option
                  value="STICKER"
                  th:selected="${product.productCategory.name() eq 'STICKER'}">
                  스티커
                </option>
                <option
                  value="POSTCARD"
                  th:selected="${product.productCategory.name() eq 'POSTCARD'}">
                  엽서
                </option>
                <option
                  value="ETC"
                  th:selected="${product.productCategory.name() eq 'ETC'}">
                  기타
                </option>
              </select>
            </div>
            <!-- /카테고리 -->

            <!-- 판매가격 -->
            <div class="container__input">
              <label for="price"
                >판매 가격<span class="required-text">* 필수</span></label
              >
              <input
                type="text"
                id="price"
                name="price"
                required
                oninput="this.value = this.value.replace(/[^0-9]/g, '').replace(/^0+/, '')"
                placeholder="숫자만 입력해주세요."
                th:value="${#numbers.formatInteger(product.price, 3)}" />
            </div>
            <!-- /판매가격 -->

            <!-- 재고 수량 -->
            <div class="container__input">
              <label for="count"
                >재고 수량<span class="required-text">* 필수</span></label
              >
              <input
                type="number"
                id="count"
                name="count"
                required
                placeholder="숫자만 입력해주세요."
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                th:value="${product.count}" />
            </div>
            <!-- /재고 수량 -->

            <!-- 상품 설명 -->
            <div class="container__input">
              <label for="description">상품 설명</label>
              <textarea
                cols="47"
                rows="5"
                id="description"
                oninput="this.value = this.value.replace(/[^a-zA-Z0-9ㄱ-ㅎ ㅏ-ㅣ 가-힇!@#$%^&*,./?]/g, '').substr(0, 200)"
                placeholder="상품 설명은 200자 이내로 작성해주세요."
                name="ProductDescription"
                th:text="${product.productDescription}"></textarea>
            </div>
            <!-- /상품 설명 -->

            <input
              type="hidden"
              id="deletedImages"
              name="deletedImages"
              value="" />
            <!-- 이미지 -->
            <!-- 상품 메인 이미지 -->
            <div class="container__input">
              <label
                >상품 메인 이미지 (1장만 업로드 가능)<span class="required-text"
                  >* 필수</span
                ></label
              >

              <!-- 새 이미지 업로드 -->
              <input
                type="file"
                name="mainImage"
                id="mainImage"
                accept="image/*"
                oninput="this.form.submitButton.disabled = !this.files.length"
                onchange="previewSingleImage(event, 'mainImagePreview', 'mainImage')" />
              <!-- 기존 이미지 미리보기 (있다면) -->
              <div id="mainImagePreview" class="preview-container">
                <div class="mainImageContainer" id="existingMainImage">
                  <img
                    th:src="@{/productImages/{uuid}{fileExtension}(uuid=${product.productImage.uuid}, fileExtension=${product.productImage.fileExtension})}"
                    class="thumbnail" />
                  <!-- <button type="button" class="btn-delete">x</button> -->
                </div>
              </div>
            </div>

            <!-- 상품 서브 이미지 (최대 3장) -->
            <div class="container__input">
              <label>상품 서브 이미지 (최대 3장)</label>
              <input
                type="file"
                id="subImage"
                name="subImage"
                accept="image/*"
                multiple
                onchange="previewMultipleImages(event, 'subImagePreview', 3, 'subImage')" />
              <div class="subImageContainer" id="existingSubImage">
                <div id="subImagePreview" class="preview-container">
                  <div
                    class="image-container subImage-image-container"
                    th:each="sub, iterStat : ${subImage}"
                    id="subImageContainer-[[${iterStat.index}]]">
                    <img th:src="@{${sub}}" class="thumbnail" />
                    <button
                      class="btn-delete"
                      type="button"
                      th:attr="onclick=|deleteExistingImage(this, [[${iterStat.index}]], 'subImage')|">
                      <i
                        class="fa-solid fa-square-xmark"
                        style="color: #ff0000"></i>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="container__input">
              <label>상품 설명 이미지 (최대 5장)</label>
              <input
                type="file"
                id="descImage"
                name="descImage"
                accept="image/*"
                multiple
                onchange="previewMultipleImages(event, 'descImagePreview', 5, 'descImage')" />
              <div id="descImagePreview" class="preview-container">
                <div
                  class="image-container"
                  th:each="desc, iterStat : ${descImage}"
                  id="descImageContainer-[[${iterStat.index}]]">
                  <img th:src="@{${desc}}" class="thumbnail" />
                  <button
                    type="button"
                    class="btn-delete"
                    th:attr="onclick=|deleteExistingImage(this, [[${iterStat.index}]], 'descImage')|">
                    <i
                      class="fa-solid fa-square-xmark"
                      style="color: #ff0000"></i>
                  </button>
                </div>
              </div>
            </div>
            <!-- /이미지 -->
            <div class="HanCardNewButton2">
              <button
                class="HanCancel"
                type="button"
                onclick="location.href='/master/product/list'">
                취소
              </button>
              <button class="HanSubmit" name="submitButton" type="submit">
                수정
              </button>
            </div>
          </form>
          <!-- /form -->
        </div>
      </div>
    </main>
  </body>
  <script th:src="@{/js/master/masterNavigation.js}"></script>
  <script>
    // 기존 이미지 삭제 함수 (메인, 서브, 설명 이미지)
    function deleteExistingImage(button, index, type) {
      // id 기반 삭제 시도
      let imageContainer = document.getElementById(`${type}Container-${index}`);

      if (!imageContainer) {
        imageContainer = button.closest("div");
      }

      if (imageContainer) {
        imageContainer.remove(); // 화면에서 즉시 삭제
      }
      // 삭제된 이미지 목록 업데이트
      const deletedImagesInput = document.getElementById("deletedImages");
      let deletedImages = deletedImagesInput.value
        ? deletedImagesInput.value.split(",")
        : [];

      if (!deletedImages.includes(`${type}${index}`)) {
        deletedImages.push(`${type}${index}`);
      }

      deletedImagesInput.value = deletedImages.join(",");
    }

    // 기존 메인 이미지 삭제
    function deleteMainImage() {
      const mainPreviewContainer = document.getElementById("mainImagePreview");
      if (mainPreviewContainer) {
        mainPreviewContainer.innerHTML = ""; // 미리보기 삭제
      }

      const mainInput = document.getElementById("mainImage");
      if (mainInput) {
        mainInput.value = ""; // 파일 선택 초기화
      }

      const deletedImagesInput = document.getElementById("deletedImages");
      let deletedImages = deletedImagesInput.value
        ? deletedImagesInput.value.split(",")
        : [];

      if (!deletedImages.includes("mainImage")) {
        deletedImages.push("mainImage");
      }

      deletedImagesInput.value = deletedImages.join(",");
    }

    // 새로 추가한 이미지 삭제 (서브, 설명 이미지)
    function deleteNewImage(index, type) {
      console.log(`새 이미지 삭제 실행: type=${type}, index=${index}`);

      const imageContainer = document.getElementById(`new${type}-${index}`);
      if (imageContainer) {
        imageContainer.remove(); // 화면에서 즉시 삭제
      }

      const fileInput = document.getElementById(type);
      if (fileInput) {
        fileInput.value = ""; // 파일 선택 초기화
      }
    }

    // 서브, 설명 이미지 미리보기 기능 (동적 추가)
    const newImageIndex = {};

    function previewMultipleImages(event, previewId, maxImages, type) {
      const previewContainer = document.getElementById(previewId);
      const files = event.target.files;

      if (!previewContainer || !files) return;

      // newImageIndex[type]가 없으면 초기화
      if (!newImageIndex[type]) {
        newImageIndex[type] = 0;
      }

      for (let i = 0; i < files.length; i++) {
        if (previewContainer.childElementCount >= maxImages) {
          alert(`최대 ${maxImages}개의 이미지만 업로드할 수 있습니다.`);
          break;
        }

        const file = files[i];
        const reader = new FileReader();
        const currentIndex = newImageIndex[type]++;

        reader.onload = function (e) {
          const imageContainer = document.createElement("div");
          imageContainer.classList.add("image-container");
          imageContainer.classList.add(`${type}-image-container`); // text
          imageContainer.id = `new${type}-${currentIndex}`;

          const img = document.createElement("img");
          img.src = e.target.result;
          img.classList.add("thumbnail");

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.innerHTML =
            '<i class="fa-solid fa-square-xmark" style="color: #ff0000;"></i>';
          deleteButton.className = "btn-delete";
          deleteButton.onclick = function () {
            deleteNewImage(currentIndex, type);
          };

          imageContainer.appendChild(img);
          imageContainer.appendChild(deleteButton);
          previewContainer.appendChild(imageContainer);
        };

        reader.readAsDataURL(file);
      }
    }

    // 메인 이미지 미리보기 기능
    function previewSingleImage(event, previewId, inputId) {
      const file = event.target.files[0];
      const previewContainer = document.getElementById(previewId);
      previewContainer.innerHTML = "";

      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          const imageContainer = document.createElement("div");
          imageContainer.classList.add("image-container");
          imageContainer.id = `new${inputId}`;

          const imgElement = document.createElement("img");
          imgElement.src = e.target.result;
          imgElement.classList.add("thumbnail");

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.innerHTML =
            '<i class="fa-solid fa-square-xmark" style="color: #ff0000;"></i>';
          deleteButton.className = "btn-delete";
          deleteButton.onclick = function () {
            deleteMainImage();
          };

          imageContainer.appendChild(imgElement);
          imageContainer.appendChild(deleteButton);
          previewContainer.appendChild(imageContainer);
        };
        reader.readAsDataURL(file);
      }
    }
    // form required
    function doAction() {
      let checkProductName = document.getElementById("productName");
      let checkCategory = document.getElementById("category");
      let checkPrice = document.getElementById("price");
      let checkCount = document.getElementById("count");
      let checkExistingMainImage = document.getElementById("existingMainImage");
      let checkMainImage = document.getElementById("mainImage");
      let checkSubImageContainer = document.querySelectorAll(
        ".subImage-image-container"
      );
      let checkDescImageContainer = document.querySelectorAll(
        ".descImage-image-container"
      );

      let cPrice = /^[0-9]+$/;

      if (checkProductName.value.length === 0) {
        alert("상품명은 필수 입력 사항입니다.");
        return false;
      }
      if (checkCategory.value === "#") {
        alert("상품 카테고리는 필수 입력 사항입니다.");
        return false;
      }
      if (checkPrice.value.length === 0) {
        alert("판매 가격은 필수 입력 사항입니다.");
        return false;
      }
      if (!cPrice.test(checkPrice.value)) {
        alert("판매 가격은 숫자만 입력 가능합니다.");
        return false;
      }
      if (Number(checkPrice.value) < 100) {
        alert("최소 판매 금액은 100원입니다.");
        return false;
      }
      if (checkCount.value.length === 0) {
        alert("재고 수량은 필수 입력 사항입니다.");
        return false;
      }
      if (!cPrice.test(checkCount.value)) {
        alert("재고 수량은 숫자만 입력 가능합니다.");
        return false;
      }
      if (checkMainImage.files.length === 0 && checkExistingMainImage === 0) {
        alert("상품 메인 이미지는 필수 입력 사항입니다.");
        return false;
      }
      if (Number(checkSubImageContainer.length) > 3) {
        alert("상품 서브이미지는 최대 3장까지 등록 가능합니다.");
        return false;
      }
      if (Number(checkDescImageContainer.length) > 5) {
        alert("상품 설명 이미지는 최대 5장까지 등록 가능합니다.");
        return false;
      }
      if (!confirm("상품 정보를 수정하시겠습니까?")) {
        return false;
      }
      alert("상품정보가 수정되었습니다.");
      return true;
    }

    document.addEventListener("DOMContentLoaded", function () {
      const descImageInput = document.getElementById("descImage");
      const dataTransfer = new DataTransfer(); //

      descImageInput.addEventListener("change", function () {
        let fileArr = descImageInput.files;

        if (fileArr && fileArr.length > 0) {
          for (let i = 0; i < fileArr.length; i++) {
            dataTransfer.items.add(fileArr[i]);
          }

          descImageInput.files = dataTransfer.files;
        }
      });
    });
    document.addEventListener("DOMContentLoaded", function () {
      const subImageInput = document.getElementById("subImage");
      const dataTransfer = new DataTransfer(); //

      subImageInput.addEventListener("change", function () {
        let fileArr = subImageInput.files;

        if (fileArr && fileArr.length > 0) {
          for (let i = 0; i < fileArr.length; i++) {
            dataTransfer.items.add(fileArr[i]);
          }

          subImageInput.files = dataTransfer.files;
        }
      });
    });
  </script>
</html>
