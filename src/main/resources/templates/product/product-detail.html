<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="/css/mainPage.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <style>
      .container {
        justify-self: center;
      }

      .container__main {
        max-width: 100%;
        width: 67.5rem;
        margin-top: 2rem;
        justify-self: center;
      }

      .container__flex {
        border: 1px solid #d2d2d2;
        display: flex;
        justify-content: space-between;
      }

      .image__main {
        max-width: 100%;
        width: 31rem;
        height: 31rem;
        padding: 1rem;
      }

      .image__sub {
        width: 5rem;
        height: 5rem;
        cursor: pointer;
      }

      .flex {
        display: flex;
        flex-wrap: wrap;
      }

      .flex__sub-image {
        display: flex;
        justify-content: center;
      }

      .image__sub {
        margin: 1rem;
      }

      .product-info {
        margin: 3rem;
        width: 28rem;
        max-width: 100%;
        margin-bottom: 1rem;
      }

      .product-info__name {
        font-size: 2rem;
        margin-top: 0px;
        word-break: break-all;
      }

      .product-info__price {
        text-align: right;
        color: #da2828;
        font-size: 2rem;
        font-weight: bold;
      }

      .product-info__count {
        color: #434343;
        font-weight: bolder;
      }

      .product-info__p {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
        align-items: center;
      }

      .product-info__totalPrice {
        color: #da2828;
        font-size: 2rem;
        font-weight: bold;
        text-align: right;
      }

      .btn__order {
        font-size: 1rem;
        width: 20rem;
        height: 3rem;
        background-color: #fff6a6;
        color: #363636;
        border: 0px;
        border-radius: 7px;
      }

      .btn__order:hover {
        background-color: #fbea4f;
        color: #585858;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .btn__cart {
        font-size: 1rem;
        width: 7rem;
        height: 3rem;
        border: 0px;
        border-radius: 7px;
        background-color: #bee1e6;
      }

      .btn__cart:hover {
        cursor: pointer;
        background-color: #8ecdd7;
      }

      .flex__btn {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
      }

      /* .button__top {
        position: fixed;
        right: 2rem;
        bottom: 3rem;
      } */

      .desc-image {
        width: 57rem;
        /* height: 57rem; */
      }

      .image__desc {
        text-align: center;
        margin-top: 3rem;
      }

      .notice__product-cnt {
        justify-self: center;
      }

      .image__notice {
        width: 30rem;
      }

      .HanProductCntDiv {
        display: flex;
        width: 28rem;
        justify-content: space-between;
      }

      /* 수량버튼 css */
      .HanProductSpinner {
        display: flex;
        align-items: center;
        border: 1px solid #ccc;
        overflow: hidden;
        width: 120px;
        height: 40px;
        margin-top: 7px;
      }

      .HanProductSpinner button {
        width: 35px;
        height: 40px;
        background-color: #f9f9f9;
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: #333;
      }

      .HanProductSpinner button:disabled {
        cursor: not-allowed;
        color: #eefcd7;
      }

      .HanProductSpinner button:hover:not(:disabled) {
        background-color: #fffebf;
      }

      .HanProductSpinner input {
        width: 50px;
        text-align: center;
        border: none;
        outline: none;
        font-size: 16px;
      }

      .HanProductPriceSum {
        font-size: 35px;
      }

      .HanProductSumCnt {
        color: #969696;
        font-size: 18px;
      }

      .HanProductPriceSumCnt {
        color: #969696;
        font-size: 22px;
      }

      .text__black {
        color: #333;
        font-weight: 400;
        font-size: 1rem;
      }

      .text__desc {
        margin-top: 1rem;
        font-size: 1.2rem;
        border: 1px solid #cccccc;
        padding: 2rem;
      }

      .deliveryCompany {
        margin-left: 0.5rem;
      }

      .deliveryNotice {
        color: #ff7f0f;
      }

      .delivery__div {
        display: flex;
        flex-wrap: nowrap;
      }

      .product-info__post {
        margin-bottom: 1rem;
      }
      #topBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 10px 15px;
        font-size: 18px;
        cursor: pointer;
        display: none;
        /* 기본적으로 버튼 숨김 */
      }
      .qw {
        text-align: right;
      }
    </style>
  </head>

  <body>
    <header th:replace="~{/fragments/memberHeader::memberHeader}"></header>
    <!--    <nav th:replace="~{/fragments/memberNav::memberNav}"></nav>-->

    <main class="container__main">
      <div class="container__flex">
        <div class="flex">
          <div th:each="product : ${product}"></div>
          <span>
            <img
              class="image__main"
              th:src="@{|/productImages/${product.mainImage.uuid}${product.mainImage.fileExtension}|}" />
            <div class="flex__sub-image">
              <img
                class="image__sub"
                th:src="@{|/productImages/${product.mainImage.uuid}${product.mainImage.fileExtension}|}" />
              <div th:each="subImage : ${product.subImage}">
                <img
                  class="image__sub"
                  onclick="addEventListener(click, changepic)"
                  th:src="@{|/productImages/${subImage.uuid}${subImage.fileExtension}|}" />
              </div>
            </div>
          </span>
          <div class="product-info">
            <p th:text="${product.name}" class="product-info__name"></p>
            <div class="qw">
              <sapn>남은 개수</sapn>
              <span
                th:text="${product.count} + '개'"
                id="productCount"
                class="product-info__count"></span>
            </div>
            <p
              th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')} + ' 원'"
              class="product-info__price">
              <span class="text__black">원</span>
            </p>
            <div class="product-info__post">
              택배 배송 | 3,000원
              <div class="delivery__div">
                <p class="deliveryNotice">주문시 결제</p>
                <p class="deliveryCompany">대한통운</p>
              </div>
              <div>50,000원 이상 구매시 무료</div>
            </div>
            <!--              <p class="product-info__orderCount">수량</p>-->
            <!--              <input type="number" min="0" />-->
            <!-- 상품 가격 (할인가) -->
            <input
              type="hidden"
              id="HanProductPriceSaleValue"
              th:value="${product.price}" />

            <div class="HanProductCntDiv">
              <!-- 수량버튼 -->
              <div class="HanProductSpinner">
                <button onclick="changeQuantity(-1)" type="button">-</button>
                <input type="text" id="HanProductValue" value="0" readonly />
                <button id="plusBtn" onclick="changeQuantity(1)" type="button">
                  +
                </button>
              </div>

              <div>
                <span class="HanProductSumCnt" style="padding: 30px"
                  >총 금액</span
                >
                <span class="HanProductPriceSumCnt"></span>

                <!-- 총 금액 보여주는 곳 자바스크립트로 처리 -->
                <span class="HanProductPriceSum" id="HanProductPriceSum"></span>
                <span class="HanProductSpan3">원</span>
              </div>
            </div>

            <!--              <div class="product-info__p">-->
            <!--                <span>총 상품 금액</span>-->
            <!--                <span class="product-info__totalPrice">30,000원</span>-->
            <!--              </div>-->
            <hr />

            <!-- button -->

            <div th:unless="${product.count} == '0'" class="flex__btn">
              <form action="/checkout" method="get" id="checkoutForm">
                <input
                  type="hidden"
                  id="productPk1"
                  name="productPk"
                  th:value="${product.id}" />
                <input
                  type="hidden"
                  id="productCnt1"
                  name="productCnt"
                  value="1" />
                <button
                  class="btn btn__order"
                  type="submit"
                  form="checkoutForm">
                  <i class="fa-solid fa-credit-card" style="color: #f5c724"
                    >주문하기</i
                  >
                </button>
              </form>
              <form action="/cart/submit" method="post" id="cartForm">
                <input
                  type="hidden"
                  id="productPk2"
                  name="productPk"
                  th:value="${product.id}" />
                <input
                  type="hidden"
                  id="productCnt2"
                  name="productCnt"
                  value="1" />
                <button class="btn btn__cart" type="submit" form="cartForm">
                  <i class="fa-solid fa-cart-shopping" style="color: #2f648c"
                    >장바구니</i
                  >
                </button>
              </form>
            </div>

            <!-- sold out image -->

            <div th:if="${product.count} == '0'" class="notice__product-cnt">
              <img class="image__notice" src="/images/soldout.png" />
            </div>
          </div>
        </div>
      </div>
      <div th:text="${product.productDescription}" class="text__desc"></div>
      <div class="image__desc">
        <div th:each="descImage : ${product.descImage}">
          <img
            class="desc-image"
            th:src="@{|/productImages/${descImage.uuid}${descImage.fileExtension}}" />
        </div>
      </div>
    </main>
    <aside>
      <button id="topBtn" title="Go to top">▲</button>
    </aside>
    <footer th:replace="fragments/memberFooter::memberFooter"></footer>
  </body>
  <script>
    const unitPrice = document.getElementById("HanProductPriceSaleValue").value;
    const quantityInput = document.getElementById("HanProductValue");
    const quantityInputHidden = document.getElementById("productCnt1");
    const quantityInputHidden2 = document.getElementById("productCnt2");
    const totalPriceElement = document.getElementById("HanProductPriceSum");
    const soldOut = document.getElementById("soldOut");

    function changeQuantity(change) {
      let currentQuantity = parseInt(quantityInput.value);

      //+-버튼에 따라 수량 증감을 보여준다
      currentQuantity += change;

      // 1보다 작아지지 않게
      if (currentQuantity < 1) {
        currentQuantity = 1;
      }

      //재고수 보다 많이 사는 거 막기
      let productCount = document.querySelector(
        ".product-info__count"
      ).textContent;
      if (
        currentQuantity > parseInt(productCount) &&
        parseInt(productCount) !== 0
      ) {
        alert("재고수보다 많이 구매할 수 없습니다.");
        currentQuantity = parseInt(productCount);
      }

      //구매하기와 장바구니 둘다 input hidden에 넣어줌
      quantityInput.value = currentQuantity;
      quantityInputHidden.value = currentQuantity;
      quantityInputHidden2.value = currentQuantity;

      //수량에 따라 가격 변동해주는 함수 호출
      updateTotalPrice(currentQuantity);
    }

    //수량에 따라 가격변동 함수
    function updateTotalPrice(quantity) {
      let priceSumTmp = parseInt(unitPrice);

      if (isNaN(priceSumTmp) || !Number.isInteger(priceSumTmp)) {
        document.getElementById("HanProductPriceSum").textContent = "가격오류";
      } else {
        const totalPrice = priceSumTmp * quantity;

        const formatted3 = totalPrice.toLocaleString("ko-KR"); // 천 단위로 쉼표 추가
        document.getElementById("HanProductPriceSum").textContent = formatted3;
      }
    }

    //작업해야함 이미지 클릭시 변환
    let bigImage = document.querySelector(".image__main");
    let smallImage = document.querySelectorAll(".image__sub");

    for (let i = 0; i < smallImage.length; i++) {
      smallImage[i].addEventListener("click", changepic);
    }

    function changepic() {
      let smallImageAttribute = this.getAttribute("src");
      bigImage.setAttribute("src", smallImageAttribute);
    }

    // 페이지 로드되면 상품수량 +1
    window.addEventListener("load", function () {
      document.getElementById("plusBtn").onclick();
    });

    // 스크롤을 내리면 버튼을 보여주기
    window.onscroll = function () {
      let topButton = document.getElementById("topBtn");
      if (
        document.body.scrollTop > 50 ||
        document.documentElement.scrollTop > 50
      ) {
        topButton.style.display = "block"; // 스크롤이 50px 이상 내려가면 버튼 표시
      } else {
        topButton.style.display = "none"; // 50px 이하로 올라가면 버튼 숨김
      }
    };

    // 버튼 클릭 시 페이지 맨 위로 스크롤
    document.getElementById("topBtn").onclick = function () {
      window.scrollTo({ top: 0, behavior: "smooth" }); // 부드러운 스크롤로 맨 위로 이동
    };
    const productCount = document.getElementById("productCount");
    if (productCount.value <= "10") {
      productCount.getAttribute();
    }
  </script>
</html>
