<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="/css/mainPage.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <style>
      .container {
        justify-self: center;
      }
      .container__main {
        max-width: 100%;
        width: 67.5rem;
        margin-top: 2rem;
        justify-self: center;
      }
      .container__flex {
        border: 1px solid #d2d2d2;
        display: flex;
        justify-content: space-between;
      }
      .image__main {
        max-width: 100%;
        width: 33rem;
        height: 33rem;
      }
      .image__sub {
        width: 5rem;
        height: 5rem;
        cursor: pointer;
      }
      .flex {
        display: flex;
        flex-wrap: wrap;
      }
      .flex__sub-image {
        display: flex;
        justify-content: center;
      }
      .image__sub {
        margin: 1rem;
      }
      .product-info {
        margin: 3rem;
        width: 28rem;
        max-width: 100%;
        margin-bottom: 1rem;
      }
      .product-info__name {
        font-size: 2rem;
        margin-top: 0px;
        word-break: break-all;
      }
      .product-info__price {
        text-align: right;
        color: #da2828;
        font-size: 2rem;
        font-weight: bold;
      }
      .product-info__count {
        color: #686868;
      }
      .product-info__p {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
        align-items: center;
      }
      .product-info__totalPrice {
        color: #da2828;
        font-size: 2rem;
        font-weight: bold;
        text-align: right;
      }
      .btn__order {
        font-size: 1rem;
        width: 20rem;
        height: 3rem;
        background-color: #fff6a6;
        color: #363636;
        border: 0px;
        border-radius: 7px;
      }
      .btn__order:hover {
        background-color: #fbea4f;
        color: #585858;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .btn__cart {
        font-size: 1rem;
        width: 7rem;
        height: 3rem;
        border: 0px;
        border-radius: 7px;
        background-color: #bee1e6;
      }
      .btn__cart:hover {
        cursor: pointer;
        background-color: #8ecdd7;
      }
      .flex__btn {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
      }
      .button__top {
        position: fixed;
        right: 2rem;
        bottom: 3rem;
      }
      .desc-image {
        width: 57rem;
        height: 57rem;
      }
      .image__desc {
        text-align: center;
        margin-top: 3rem;
      }
      .notice__product-cnt {
        justify-self: center;
      }
      .image__notice {
        width: 30rem;
      }
      .HanProductCntDiv {
        display: flex;
        width: 28rem;
        justify-content: space-between;
      }

      /* 수량버튼 css */
      .HanProductSpinner {
        display: flex;
        align-items: center;
        border: 1px solid #ccc;
        overflow: hidden;
        width: 120px;
        height: 40px;
        margin-top: 7px;
      }

      .HanProductSpinner button {
        width: 35px;
        height: 40px;
        background-color: #f9f9f9;
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: #333;
      }

      .HanProductSpinner button:disabled {
        cursor: not-allowed;
        color: #eefcd7;
      }

      .HanProductSpinner button:hover:not(:disabled) {
        background-color: #fffebf;
      }

      .HanProductSpinner input {
        width: 50px;
        text-align: center;
        border: none;
        outline: none;
        font-size: 16px;
      }

      .HanProductPriceSum {
        font-size: 35px;
      }

      .HanProductSumCnt {
        color: #969696;
        font-size: 18px;
      }

      .HanProductPriceSumCnt {
        color: #969696;
        font-size: 22px;
      }
      .text__black {
        color: #333;
        font-weight: 400;
        font-size: 1rem;
      }
      .text__desc {
        margin-top: 1rem;
        font-size: 1.2rem;
        border: 1px solid #cccccc;
        padding: 2rem;
      }
    </style>
  </head>
  <body>
    <header th:replace="~{/fragments/memberHeader::memberHeader}"></header>
    <!--    <nav th:replace="~{/fragments/memberNav::memberNav}"></nav>-->

    <main class="container__main">
      <div class="container__flex">
        <div class="flex">
          <div th:each="product : ${product}"></div>
          <span>
            <img
              class="image__main"
              th:src="@{|/image/${product.mainImage.uuid}${product.mainImage.fileExtension}|}" />
            <div class="flex__sub-image">
              <img
                class="image__sub"
                th:src="@{|/image/${product.mainImage.uuid}${product.mainImage.fileExtension}|}" />
              <div th:each="subImage : ${product.subImage}">
                <img
                  class="image__sub"
                  onclick="addEventListener(click, changepic)"
                  th:src="@{|/image/${subImage.uuid}${subImage.fileExtension}|}" />
              </div>
            </div>
          </span>
          <div class="product-info">
            <form action="#" method="#">
              <p th:text="${product.name}" class="product-info__name"></p>
              <span
                th:text="${product.count}"
                class="product-info__count"></span
              ><sapn> 개 남았습니다.</sapn>
              <p th:text="${product.price}" class="product-info__price">
                <span class="text__black">원</span>
              </p>
              <p class="product-info__post">택배 배송 | 3,000원</p>
              <!--              <p class="product-info__orderCount">수량</p>-->
              <!--              <input type="number" min="0" />-->
              <!-- 상품 가격 (할인가) -->
              <input
                type="hidden"
                id="HanProductPriceSaleValue"
                th:value="${product.price}" />

              <div class="HanProductCntDiv">
                <!-- 수량버튼 -->
                <div class="HanProductSpinner">
                  <button onclick="changeQuantity(-1)">-</button>
                  <input type="text" id="HanProductValue" value="0" readonly />
                  <button onclick="changeQuantity(1)">+</button>
                </div>

                <div>
                  <span class="HanProductSumCnt" style="padding: 30px"
                    >총 금액</span
                  >
                  <span class="HanProductPriceSumCnt"></span>

                  <!-- 총 금액 보여주는 곳 자바스크립트로 처리 -->
                  <span
                    class="HanProductPriceSum"
                    id="HanProductPriceSum"></span>
                  <span class="HanProductSpan3">원</span>
                </div>
              </div>

              <!--              <div class="product-info__p">-->
              <!--                <span>총 상품 금액</span>-->
              <!--                <span class="product-info__totalPrice">30,000원</span>-->
              <!--              </div>-->
              <hr />

              <!-- button -->

              <div th:unless="${product.count} == '0'" class="flex__btn">
                <button class="btn btn__order" type="submit">
                  <i class="fa-solid fa-credit-card" style="color: #f5c724">
                    주문하기</i
                  >
                </button>
                <button class="btn btn__cart" type="submit">
                  <i class="fa-solid fa-cart-shopping" style="color: #2f648c">
                    장바구니</i
                  >
                </button>
              </div>

              <!-- sold out image -->

              <div th:if="${product.count} == '0'" class="notice__product-cnt">
                <img class="image__notice" src="/images/soldout.png" />
              </div>
            </form>
          </div>
        </div>
      </div>
      <div th:text="${product.productDescription}" class="text__desc"></div>
      <div class="image__desc">
        <div th:each="descImage : ${product.descImage}">
          <img
            class="desc-image"
            th:src="@{|/image/${descImage.uuid}${descImage.fileExtension}}" />
        </div>
      </div>
    </main>
    <aside>
      <button class="button__top" type="button" onclick="window.scrollTo(0,0);">
        TOP
      </button>
    </aside>
    <footer th:replace="fragments/memberFooter::memberFooter"></footer>
  </body>
  <script>
    const unitPrice = document.getElementById("HanProductPriceSaleValue").value;
    const quantityInput = document.getElementById("HanProductValue");
    // const quantityInputHidden = document.getElementById('HanProductValueHidden');
    // const quantityInputHidden2 = document.getElementById('HanProductValueHidden2');
    const totalPriceElement = document.getElementById("HanProductPriceSum");
    const soldOut = document.getElementById("soldOut");

    function changeQuantity(change) {
      let currentQuantity = parseInt(quantityInput.value);

      //+-버튼에 따라 수량 증감을 보여준다
      currentQuantity += change;

      // 1보다 작아지지 않게
      if (currentQuantity < 1) {
        currentQuantity = 1;
      }
      //구매하기와 장바구니 둘다 input hidden에 넣어줌
      quantityInput.value = currentQuantity;
      // quantityInputHidden.value = currentQuantity;
      // quantityInputHidden2.value = currentQuantity;

      //수량에 따라 가격 변동해주는 함수 호출
      updateTotalPrice(currentQuantity);
    }

    //수량에 따라 가격변동 함수
    function updateTotalPrice(quantity) {
      let priceSumTmp = parseInt(unitPrice);

      if (isNaN(priceSumTmp) || !Number.isInteger(priceSumTmp)) {
        document.getElementById("HanProductPriceSum").textContent = "가격오류";
      } else {
        const totalPrice = priceSumTmp * quantity;

        const formatted3 = totalPrice.toLocaleString("ko-KR"); // 천 단위로 쉼표 추가
        document.getElementById("HanProductPriceSum").textContent = formatted3;
      }
    }

    //작업해야함 이미지 클릭시 변환
    let bigImage = document.querySelector(".image__main");
    let smallImage = document.querySelectorAll(".image__sub");

    for (let i = 0; i < smallImage.length; i++) {
      smallImage[i].addEventListener("click", changepic);
    }

    function changepic() {
      let smallImageAttribute = this.getAttribute("src");
      bigImage.setAttribute("src", smallImageAttribute);
    }
  </script>
</html>
