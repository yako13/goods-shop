<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>관리자 주문 상세 내역</title>
    <link href="/css/masterNavigation.css" rel="stylesheet">
    <link href="/css/masterHeader.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/find.css}">
    <script src="https://kit.fontawesome.com/f3f72a2177.js" crossorigin="anonymous"></script>
    <style>
        body {
          margin: 0;
        }

        table{
          font-size: 12px;
        }

        .rwd-table {
          margin: auto;
          width: 100%;
          min-width: 300px;
          max-width: 100%;
          border-collapse: collapse;
        }

        .rwd-table tr:first-child {
          border-top: none;
          background: DFE7FD;
          color: #fff;
          background-color: #b2d5f1;
        }

        .rwd-table tr {
          border-top: 1px solid #ddd;
          border-bottom: 1px solid #ddd;
          background-color: #ffffff;
        }

        .rwd-table tr:nth-child(odd):not(:first-child) {
          background-color: #ffffff;
        }

        .rwd-table th {
          display: none;
        }

        .rwd-table td {
          display: block;
        }

        .rwd-table td:first-child {
          margin-top: .5em;
        }

        .rwd-table td:last-child {
          margin-bottom: .5em;
        }

        .rwd-table th,
        .rwd-table td {
          text-align: center;
        }

        .rwd-table {
          color: #333;
          border-radius: .4em;
          overflow: hidden;
        }

        .rwd-table tr {
          border-color: #bfbfbf;
        }

        .rwd-table th,
        .rwd-table td {
          padding: .5em 1em;
        }

        @media screen and (max-width: 601px) {
          .rwd-table tr:nth-child(2) {
            border-top: none;
          }
        }

        @media screen and (min-width: 600px) {
          .rwd-table tr:hover:not(:first-child) {
            background-color: #d8e7f3;
          }

          .rwd-table td:before {
            display: none;
          }

          .rwd-table th,
          .rwd-table td {
            display: table-cell;
            padding: .25em .5em;
          }

          .rwd-table th:first-child,
          .rwd-table td:first-child {
            padding-left: 0;
          }

          .rwd-table th:last-child,
          .rwd-table td:last-child {
            padding-right: 0;
          }

          .rwd-table th,
          .rwd-table td {
            padding: 1em !important;
          }
        }


        .container {
          display: block;
          text-align: center;
        }

        .totalPrice {
          color: red;
        }

        h2 {
          text-align: left;
        }

        .orderList {
          height: 70px;
          text-align: left;

          p {
            padding-top: 30px;
          }
        }

        #red {
          color: red;
        }

        ul{
          list-style: none;
          display: flex;
          justify-content: center;
          text-align: center;
        }

        a{
          text-decoration: none;
        }

        .active{
          width: 30px;
          background-color: #b2d5f1;
          border: #bfbfbf solid 1px;
          border-left: none;
          border-right: none;
          a{color: white;}
        }

        .disabled{
          width: 30px;
          background-color: #e2e2e2;
          border: #bfbfbf solid 1px;


          a{
            color: #bfbfbf;
            cursor: not-allowed;
          }

        }
    </style>
</head>

<body>
<header th:replace="~{/fragments/masterHeader::masterHeader}"></header>
<nav th:replace="~{/fragments/masterNavigation :: masterNav}"></nav>

<main id="main">
    <div class="container">
        <h2>주문 상세 내역</h2>
        <hr>
        <div class="orderList">
            <p><b>주문 내역</b> : <b id="red">2</b>건</p>
        </div>

        <table class="rwd-table">
            <tbody>
            <tr>
                <th>주문번호</th>
                <th>주문자</th>
                <th>받는이</th>
                <th>주문 상품</th>
                <th>구매수량</th>
                <th>상품 금액</th>
                <th>총 결제 금액</th>
                <th>결제수단</th>
                <th>주문 상태</th>
                <th>배송 상태</th>
                <th>주문 날짜</th>
            </tr>
            <tr>
                <!-- 테이블 행 전체에 주문상세 링크걸기 -->
                <a>
                    <td>
                        20250228080808_0001
                    </td>
                    <td>김춘식</td>
                    <td>김춘식</td>
                    <td>멋있는 스티커 5장</td>
                    <td>1</td>
                    <td>5,000원</td>
                    <td class="totalPrice"><b>18,000원</b>
                    </td>
                    <td>카드</td>
                    <td>주문완료</td>
                    <td>배송완료</td>
                    <td>2025.02.28 08:08:08</td>
            </tr>
            </a>
            <tr>
                <td>
                    20250228080808_0001
                </td>
                <td>김춘식</td>
                <td>김춘식</td>
                <td>예쁜 스티커</td>
                <td>2</td>
                <td>5,000원</td>
                <td class="totalPrice"><b>18,000원</b>
                </td>
                <td>카드</td>
                <td>주문완료</td>
                <td>배송완료</td>
                <td>2025.02.28 08:08:08</td>
            </tr>
            </tbody>
        </table>
    </div>

</main>
<script th:src="@{/js/masterNavigation.js}"></script>
</body>

</html>
