<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>관리자 주문 리스트</title>
    <link th:href="@{/css/master/masterNavigation.css}" rel="stylesheet">
    <link th:href="@{/css/master/masterHeader.css}" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/master/list.css}">
    <script src="https://kit.fontawesome.com/f3f72a2177.js" crossorigin="anonymous"></script>
</head>

<body>

    <header th:replace="~{/fragments/masterHeader::masterHeader}"></header>
    <nav th:replace="~{/fragments/masterNavigation :: masterNav}"></nav>
    <input type="hidden" th:value="${alert}" id="dataAlert">

    <main id="main">
        <div class="container">
            <h2>전체 주문 목록</h2>
            <hr>
            <div class="orderList">
                <p><b>주문 내역</b> : <b id="red">[[${total}]]</b>건</p>
            </div>

            <table class="rwd-table">
                <tbody>
                    <tr>
                        <th>주문번호</th>
                        <th>주문자</th>
                        <th>받는이</th>
                        <th>주문 상품</th>
                        <th>총 결제 금액</th>
                        <th>결제수단</th>
                        <th>주문 상태</th>
                        <th>배송 상태</th>
                        <th>주문 날짜</th>
                        <th>수정 날짜</th>
                    </tr>
                    <tr th:each="checkout : ${checkoutList}">


                        <td>
                            <a th:href="@{'/master/checkout/details/'+${checkout.id}}"> <b>20250228080808_0001</b></a>
                        </td>

                        <td th:text="${checkout.checkoutName}"></td>
                        <td th:text="${checkout.checkoutDeliveryName}"></td>
                        <td th:text="${checkout.checkoutProductName}"></td>
                        <td th:text="${checkout.checkoutTotalPay}" class="totalPrice"><b>18,000원</b>
                        </td>
                        <td>카드</td>
                        <td th:text="${checkout.checkoutStep}"></td>
                        <td th:text="${checkout.checkoutPostStep}"></td>
                        <td th:text="${checkout.createdAt}"></td>
                        <td th:text="${checkout.modifiedAt}"></td>

                    </tr>
                </tbody>
            </table>
        </div>
        <nav th:if="${!checkoutList.isEmpty()}">
            <ul class="pagination">
                <li class="page-item" th:classappend="${!paging.hasPrevious} ? 'disabled'">
                    <a class="page-link" th:href="@{|?page=0|}" aria-label="First">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item" th:each="page: ${#numbers.sequence(0, paging.totalPages-1)}"
                    th:classappend="${page == paging.number} ? 'active'"
                    th:if="${page>=paging.number-1 and page <= paging.number+1}">
                    <a class="page-link" th:text="${page+1}" th:href="@{|?page=${page}|}"></a>
                </li>
                <li class="page-item" th:classappend="${!paging.hasNext} ? 'disabled'">
                    <a class="page-link" th:href="@{|?page=${paging.totalPages-1}|}" aria-label="Last"></a>
                    <span aria-hidden="true">&raquo;</span>
                </li>
            </ul>
        </nav>

    </main>
    <script th:src="@{/js/master/masterNavigation.js}"></script>
    <script th:src="@{/js/master/checkout.js}"></script>
</body>

</html>
