<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️CloudStar WorkShop 홈</title>

    <link rel="stylesheet" th:href="@{/css/mainPage.css}">

    <style>
        .HanMainBodyTitle a {
            text-decoration: none;
            color: black;
            outline: none;
            border: none;
            background-color: none;
            font-size: 30px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;


        }

        .HanMainBodyTitle a:hover {

            transform: translateY(-3px);

        }

        .HanSection {
            /* 화면 전체 높이 */
            height: 90vh;
        }

        body {

            /* 부드러운 스크롤 효과 */
            scroll-snap-type: y mandatory;

        }

        /* 초기 상태: 숨겨진 상태 */
        .HanMainNewDivCard {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        /* 스크롤해서 보이면 적용할 클래스 */
        .show {
            opacity: 1;
            transform: translateY(0);
        }

        .HanMainNewDivCard:nth-child(1) {
            transition-delay: 0s;
        }

        .HanMainNewDivCard:nth-child(2) {
            transition-delay: 0.4s;
        }

        .HanMainNewDivCard:nth-child(3) {
            transition-delay: 0.6s;
        }

        .HanMainNewDivCard:nth-child(4) {
            transition-delay: 0.8s;
        }
    </style>


</head>

<body>
<div id="topSection" class="HanSection">
    <!--헤더 네비-->

    <header th:replace="/fragments/memberHeader::memberHeader" class="HanSection"></header>

    <!-- 헤더 끝 -->

    <!--알람-->

    <input type="hidden" th:value="${alert}" id="dataAlert">


    <!-- 메인 시작 -->

    <!-- 캐러셀 시작 -->





    <div class="HanCarouselBody">


        <div class="HanCarousel">


            <div class="HanCarouselButton">

                <!-- 왼쪽 버튼 -->
                <button class="HanArrow HanArrowLeft"></button>

                <!-- 오른쪽 버튼 -->
                <button class="HanArrow HanArrowRight"></button>

            </div>


            <div class="HanTrack">

                <div class="HanTrackSlide"><img th:src="@{images/carousel1.png}" alt="1"></div>
                <div class="HanTrackSlide"><img th:src="@{images/carousel2.png}" alt="2"></div>
                <div class="HanTrackSlide"><img th:src="@{images/carousel3.png}" alt="3"></div>

            </div>

            <!-- 인디케이터 -->

            <div class="HanDots"></div>

        </div>


    </div>

    <!-- 캐러셀 끝 -->

</div>

<div class="HanMainBody">


    <!--  베스트 상품 순  -->

    <div id="bestProducts" class="HanSection">


        <div class="HanMainBodyTitle">

            <a id="showBest">베스트</a>

        </div>
        <hr class="HanProductHr">




        <div class="HanMainNewDiv ">

            <div class="HanMainNewDivCard" th:each="productCount : ${productListCount}">
                <div class="HanMainNewDivCardSort">

                    <p>[[${productCount.sort}]].</p>


                </div>

                <div class="HanMainNewDivCardImg">
                    <a th:href="@{'/product/details/'+${productCount.id}}">
                        <img th:src="@{${productCount.mainImagePath}}" alt="상품이미지">
                    </a>

                </div>

                <div class="HanMainNewDivCardPDiv">

                    <p class="HanMainNewDivCardPDivName" th:text="${productCount.name}">동화 일러스트 키캡 4종</p>
                    <p class="HanMainNewDivCardPDivPrice" th:text="${productCount.price}">20,000원</p>

                </div>

            </div>

        </div>




    </div>

    <!--  /베스트 상품 순  -->



    <!--  신상품 순  -->

    <div id="newProducts" class="HanSection">

        <div class="HanMainBodyTitle">

            <a id="showNew">신상품</a>

        </div>
        <hr class="HanProductHr">


        <div class="HanMainNewDivAera">

            <div class="HanMainNewDiv ">

                <div class="HanMainNewDivCard" th:each="productId : ${productListId}">
                    <div class="HanMainNewDivCardSort">

                        <p style="text-align: left;">[[${productId.sort}]].</p>


                    </div>

                    <div class="HanMainNewDivCardImg">

                        <a th:href="@{'/product/details/'+${productId.id}}">
                            <img th:src="@{${productId.mainImagePath}}" alt="상품이미지">
                        </a>

                    </div>

                    <div class="HanMainNewDivCardPDiv">

                        <p class="HanMainNewDivCardPDivName" th:text="${productId.name}">동화 일러스트 키캡 4종</p>
                        <p class="HanMainNewDivCardPDivPrice" th:text="${productId.price}">20,000원</p>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <!--  /신상품 순  -->



</div>

<!-- 메인 끝 -->


<!-- 푸터 시작 -->

<footer th:replace="/fragments/memberFooter::memberFooter"></footer>



<!-- 푸터 끝 -->

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const topSection = document.getElementById("topSection"); // 맨 위

        const bestProductSection = document.getElementById("bestProducts"); // 베스트
        const newProductSection = document.getElementById("newProducts"); // 신상품

        let currentSection = 0; // 현재 위치 (0: 맨 위, 1: 신상품, 2: 베스트)
        let isScrolling = false; // 연속 실행 방지

        window.addEventListener("wheel", function (event) {
            if (isScrolling) return;
            isScrolling = true;

            setTimeout(() => {
                isScrolling = false;
            }, 2000); // 2초 동안 추가 스크롤 방지 (부드러운 애니메이션 효과)

            if (event.deltaY > 0) {
                // 아래로 스크롤
                if (currentSection === 0) {
                    bestProductSection
                    bestProductSection.scrollIntoView({ behavior: "smooth", block: "center" });
                    currentSection = 1;
                } else if (currentSection === 1) {
                    newProductSection.scrollIntoView({ behavior: "smooth", block: "center" });
                    currentSection = 2;
                }
            } else {
                // 위로 스크롤
                if (currentSection === 2) {
                    bestProductSection.scrollIntoView({ behavior: "smooth", block: "center" });
                    currentSection = 1;
                } else if (currentSection === 1) {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                    currentSection = 0;
                }
            }
        });
    });

    document.addEventListener("DOMContentLoaded", function () {
        const cards = document.querySelectorAll(".HanMainNewDivCard"); // 모든 카드 선택

        function handleScroll() {
            const windowHeight = window.innerHeight; // 현재 브라우저 창 높이

            cards.forEach(card => {
                const cardTop = card.getBoundingClientRect().top; // 카드의 현재 위치
                if (cardTop < windowHeight * 0.85) { // 85% 이상 화면에 들어오면
                    setTimeout(() => {
                    }, 300); // 0.3초 동안 추가 스크롤 방지
                    card.classList.add("show");
                }
            });
        }

        window.addEventListener("scroll", handleScroll); // 스크롤 감지
        handleScroll(); // 페이지 로드 시 초기 실행
    });




</script>




<script th:src="@{/js/member/alert.js}"></script>

</body>

</html>
