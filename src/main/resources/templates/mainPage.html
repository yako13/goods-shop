<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>☁️CloudStar WorkShop 홈</title>

    <link rel="stylesheet" th:href="@{/css/mainPage.css}" />

    <style>
      #topBtn {
        width: 90px;
        height: 90px;
        position: fixed;
        bottom: 20px;
        right: 20px;
        border: none;
        padding: 10px 15px;
        cursor: pointer;
        display: none;
        /* 기본적으로 버튼 숨김 */
      }

      .HanMainBodyTitle a {
        text-decoration: none;
        color: black;
        outline: none;
        border: none;
        background-color: none;
        font-size: 30px;
        transition: all 0.3s ease-in-out;
        cursor: pointer;
      }

      .HanMainBodyTitle a:hover {
        transform: translateY(-3px);
      }

      .HanSection {
        /* 화면 전체 높이 */
        height: 90vh;
      }

      body {
        /* 부드러운 스크롤 효과 */
        scroll-snap-type: y mandatory;
      }

      /* 초기 상태: 숨겨진 상태 */
      .HanMainNewDivCard {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
      }

      /* 스크롤해서 보이면 적용할 클래스 */
      .show {
        opacity: 1;
        transform: translateY(0);
      }

      .HanMainNewDivCard:nth-child(1) {
        transition-delay: 0s;
      }

      .HanMainNewDivCard:nth-child(2) {
        transition-delay: 0.4s;
      }

      .HanMainNewDivCard:nth-child(3) {
        transition-delay: 0.6s;
      }

      .HanMainNewDivCard:nth-child(4) {
        transition-delay: 0.8s;
      }
    </style>
  </head>

  <body>
    <div id="topSection" class="HanSection">
      <!--헤더 네비-->

      <header
        th:replace="/fragments/memberHeader::memberHeader"
        class="HanSection"></header>

      <!-- 헤더 끝 -->

      <!--알람-->

      <input type="hidden" th:value="${alert}" id="dataAlert" />

      <!-- 메인 시작 -->

      <!-- 캐러셀 시작 -->

      <div class="HanCarouselBody">
        <div class="HanCarousel">
          <div class="HanCarouselButton">
            <!-- 왼쪽 버튼 -->
            <button class="HanArrow HanArrowLeft"></button>

            <!-- 오른쪽 버튼 -->
            <button class="HanArrow HanArrowRight"></button>
          </div>

          <div class="HanTrack">
            <!-- 1setting -->
            <!-- <div class="HanTrackSlide">
              <a href="product/search/index?keyword=hambbang">
                <img th:src="@{images/carousel1.png}" alt="1" />
              </a>
            </div>
            <div class="HanTrackSlide">
              <a href="/product/search/index?keyword=EVENT 고양이"
                ><img th:src="@{images/carousel2.png}" alt="2"
              /></a>
            </div>
            <div class="HanTrackSlide">
              <a href="/product/search/index?keyword=그루밍데이"
                ><img th:src="@{images/carousel3.png}" alt="3"
              /></a>
            </div> -->
            <!-- /1setting -->

            <!-- 2setting -->
            <div class="HanTrackSlide">
              <a href="/product/details/7"
                ><img th:src="@{images/carousel1.png}" alt="1"
              /></a>
            </div>
            <div class="HanTrackSlide">
              <a href="/product/details/8"
                ><img th:src="@{images/carousel2.png}" alt="2"
              /></a>
            </div>
            <div class="HanTrackSlide">
              <a href="/product/details/9"
                ><img th:src="@{images/carousel3.png}" alt="3"
              /></a>
            </div>
            <!-- /2setting -->
          </div>

          <!-- 인디케이터 -->

          <div class="HanDots"></div>
        </div>
      </div>

      <!-- 캐러셀 끝 -->
    </div>

    <div class="HanMainBody">
      <!--  베스트 상품 순  -->

      <div id="bestProducts" class="HanSection">
        <div class="HanMainBodyTitle">
          <a id="showBest">베스트</a>
        </div>
        <hr class="HanProductHr" />

        <div class="HanMainNewDiv">
          <div
            class="HanMainNewDivCard"
            th:each="productCount : ${productListCount}">
            <div class="HanMainNewDivCardSort">
              <p>[[${productCount.sort}]].</p>
            </div>

            <div class="HanMainNewDivCardImg">
              <a th:href="@{'/product/details/'+${productCount.id}}">
                <img
                  th:src="@{${productCount.mainImagePath}}"
                  alt="상품이미지" />
              </a>
            </div>

            <div class="HanMainNewDivCardPDiv">
              <p
                class="HanMainNewDivCardPDivName"
                th:text="${productCount.name}">
                동화 일러스트 키캡 4종
              </p>
              <p
                class="HanMainNewDivCardPDivPrice"
                th:text="${productCount.price}">
                20,000원
              </p>
            </div>
          </div>
        </div>
      </div>

      <!--  /베스트 상품 순  -->

      <!--  신상품 순  -->

      <div id="newProducts" class="HanSection">
        <div class="HanMainBodyTitle">
          <a id="showNew">신상품</a>
        </div>
        <hr class="HanProductHr" />

        <div class="HanMainNewDivAera">
          <div class="HanMainNewDiv">
            <div
              class="HanMainNewDivCard"
              th:each="productId : ${productListId}">
              <div class="HanMainNewDivCardSort">
                <p style="text-align: left">[[${productId.sort}]].</p>
              </div>

              <div class="HanMainNewDivCardImg">
                <a th:href="@{'/product/details/'+${productId.id}}">
                  <img
                    th:src="@{${productId.mainImagePath}}"
                    alt="상품이미지" />
                </a>
              </div>

              <div class="HanMainNewDivCardPDiv">
                <p
                  class="HanMainNewDivCardPDivName"
                  th:text="${productId.name}">
                  동화 일러스트 키캡 4종
                </p>
                <p
                  class="HanMainNewDivCardPDivPrice"
                  th:text="${productId.price}">
                  20,000원
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!--  /신상품 순  -->

      <img th:src="@{/images/upArrow1.svg}" id="topBtn" />
    </div>

    <!-- 메인 끝 -->

    <!-- 푸터 시작 -->

    <footer th:replace="/fragments/memberFooter::memberFooter"></footer>

    <!-- 푸터 끝 -->
    <script>
      function toggleDropdown(event, dropdownId) {
        event.preventDefault();
        event.stopPropagation(); // 클릭한 요소에서 이벤트 전파 중지

        // 모든 드롭다운 닫기 (현재 선택된 것 제외)
        document
          .querySelectorAll(".HandropdownBox, .HanDrodBoxName")
          .forEach((menu) => {
            if (menu.id !== dropdownId) {
              menu.classList.remove("HanHeadershow");
            }
          });

        // 현재 드롭다운 열기/닫기
        const dropdown = document.getElementById(dropdownId);
        dropdown.classList.toggle("HanHeadershow");
      }

      // 다른 곳을 클릭하면 드롭다운 닫기
      document.addEventListener("click", function () {
        document
          .querySelectorAll(".HandropdownBox, .HanDrodBoxName")
          .forEach((menu) => {
            menu.classList.remove("HanHeadershow");
          });
      });

      // 드롭다운 안에서 클릭해도 닫히지 않도록 설정
      document
        .querySelectorAll(".HandropdownBox, .HanDrodBoxName")
        .forEach((menu) => {
          menu.addEventListener("click", function (event) {
            event.stopPropagation();
          });
        });

      const track = document.querySelector(".HanTrack");
      const slides = document.querySelectorAll(".HanTrackSlide");
      const prevBtn = document.querySelector(".HanArrowLeft");
      const nextBtn = document.querySelector(".HanArrowRight");
      const dotsContainer = document.querySelector(".HanDots");

      let index = 0;
      const totalSlides = slides.length;

      // 인디케이터 생성
      for (let i = 0; i < totalSlides; i++) {
        const dot = document.createElement("div");
        dot.classList.add("HanDot");
        if (i === 0) dot.classList.add("HanActive");
        dotsContainer.appendChild(dot);
      }
      const dots = document.querySelectorAll(".HanDot");

      //움직이는지 체크
      let move = 1;

      // 초기 스타일 설정
      slides.forEach((slide, i) => {
        slide.style.position = "absolute";
        slide.style.top = "0";
        slide.style.left = "0";
        slide.style.width = "100%";
        slide.style.opacity = i === 0 ? "1" : "0";
        slide.style.transition = "opacity 1.8s ease";
        slide.style.zIndex = i === 0 ? "1" : "0";
      });

      function updateSlide(newIndex) {
        slides.forEach((slide, i) => {
          slide.style.opacity = i === newIndex ? "1" : "0";
          slide.style.zIndex = i === newIndex ? "1" : "0";
        });
      }

      function updateDots() {
        dots.forEach((dot, i) => {
          dot.classList.toggle("HanActive", i === index);
        });
      }

      //다음 페이지
      function nextSlide() {
        if (move == 2) {
          return;
        }

        move = 2;

        restartAutoPlay();

        //화면 전환 시간보다 빠르게 넘기지 못하도록 딜레이주는 함수
        setTimeout(() => {
          index = (index + 1) % totalSlides;
          move = 1;
        }, 800);

        updateSlide(index);
        updateDots();
      }

      //이전 페이지
      function prevSlide() {
        if (move == 2) {
          return;
        }

        move = 2;

        restartAutoPlay();

        //화면 전환 시간보다 빠르게 넘기지 못하도록 딜레이주는 함수
        setTimeout(() => {
          index = (index - 1 + totalSlides) % totalSlides;
          move = 1;
        }, 800);

        updateSlide(index);
        updateDots();
      }

      function goToSlide(i) {
        restartAutoPlay();
        index = i;
        updateSlide(index);
        updateDots();
      }

      nextBtn.addEventListener("click", nextSlide);
      prevBtn.addEventListener("click", prevSlide);
      dots.forEach((dot, i) =>
        dot.addEventListener("click", () => goToSlide(i))
      );

      // 자동 슬라이드
      let autoPlay = setInterval(nextSlide, 5000);
      let autoPlayTimeout;

      function restartAutoPlay() {
        clearInterval(autoPlay);
        clearTimeout(autoPlayTimeout);
        autoPlayTimeout = setInterval(nextSlide, 5000);
      }
    </script>
    <script>
      // 페이지 스크롤링 스크립트

      let isScrolling = false; // 공유 변수

      document.addEventListener("DOMContentLoaded", function () {
        const topSection = document.getElementById("topSection");
        const bestProductSection = document.getElementById("bestProducts");
        const newProductSection = document.getElementById("newProducts");

        let currentSection = 0;

        const preventScroll = (e) => {
          e.preventDefault();
          e.stopPropagation();
        };

        // 카드 애니메이션 함수 전역에서 접근 가능하도록

        window.addEventListener(
          "wheel",
          function (event) {
            if (isScrolling) return;

            isScrolling = true;
            window.addEventListener("wheel", preventScroll, { passive: false });

            setTimeout(() => {
              isScrolling = false;
              window.removeEventListener("wheel", preventScroll, {
                passive: false,
              });

              handleScroll(); // 자동 스크롤 종료 후 카드 애니메이션 트리거
            }, 800);

            if (event.deltaY > 0) {
              if (currentSection === 0) {
                bestProductSection.scrollIntoView({
                  behavior: "smooth",
                  block: "center",
                });
                currentSection = 1;
              } else if (currentSection === 1) {
                newProductSection.scrollIntoView({
                  behavior: "smooth",
                  block: "center",
                });
                currentSection = 2;
              }
            } else {
              if (currentSection === 2) {
                bestProductSection.scrollIntoView({
                  behavior: "smooth",
                  block: "center",
                });
                currentSection = 1;
              } else if (currentSection === 1) {
                window.scrollTo({ top: 0, behavior: "smooth" });
                currentSection = 0;
              }
            }
          },
          { passive: false }
        );

        // 일반 스크롤에도 카드 애니메이션 감지
        window.addEventListener("scroll", handleScroll);
        handleScroll(); // 초기 진입 시 감지
      });
    </script>

    <script>
      // 상품 이미지 나오는 스크립트

      document.addEventListener("DOMContentLoaded", function () {
        const cards = document.querySelectorAll(".HanMainNewDivCard");

        // IntersectionObserver 설정
        const observer = new IntersectionObserver(
          (entries, observer) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                entry.target.classList.add("show"); // .show 클래스 추가
                observer.unobserve(entry.target); // 한 번만 작동하게
              }
            });
          },
          {
            threshold: 0.05, // 요소의 5%만 보여도 작동
          }
        );

        // 각 카드에 대해 옵저버 등록
        cards.forEach((card) => observer.observe(card));
      });

      // 스크롤을 내리면 버튼을 보여주기
      window.onscroll = function () {
        let topButton = document.getElementById("topBtn");
        if (
          document.body.scrollTop > 50 ||
          document.documentElement.scrollTop > 50
        ) {
          topButton.style.display = "block"; // 스크롤이 50px 이상 내려가면 버튼 표시
        } else {
          topButton.style.display = "none"; // 50px 이하로 올라가면 버튼 숨김
        }
      };

      // 버튼 클릭 시 페이지 맨 위로 스크롤
      document.getElementById("topBtn").onclick = function () {
        window.scrollTo({ top: 0, behavior: "smooth" }); // 부드러운 스크롤로 맨 위로 이동
      };
    </script>

    <script th:src="@{/js/member/alert.js}"></script>
  </body>
</html>
